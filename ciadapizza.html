<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comparador de Qualidade - Cia da Pizza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: black;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .container-img {
            position: relative;
            /* Ocupa 95% da largura ou altura disponível, o que for menor */
            width: 92vw;
            height: 85vh;
            max-width: 800px;
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            background-color: #050505;
        }

        img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            /* 'cover' faz a imagem preencher o container sem deixar bordas pretas internas */
            object-fit: cover;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #img-before {
            z-index: 10;
        }

        .status-badge {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 30;
            padding: 0.5rem 1.2rem;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.15em;
            border-width: 1px;
            transition: all 0.3s ease;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }

        .indicator-pill {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.25);
            white-space: nowrap;
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .sparkle {
            color: #fbbf24;
            display: none;
            font-size: 1.2rem;
        }

        /* Estados ativos */
        .is-active #img-before {
            opacity: 0;
        }

        .is-active .status-badge {
            background-color: #dc2626;
            border-color: #f87171;
            color: white;
            transform: scale(1.1);
        }

        .is-active .sparkle {
            display: inline;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }

        .instruction {
            color: rgba(255, 255, 255, 0.25);
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.4em;
            text-align: center;
            position: absolute;
            bottom: 3vh;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container-img" id="main-container">
        <!-- Badge -->
        <div id="badge" class="status-badge bg-white/10 border-white/20 text-white/70">
            ANTES
        </div>

        <!-- Imagem Depois (Masterizada) -->
        <img src="https://criarleal.github.io/improvepic/qcE2d3g.png" alt="Depois" id="img-after">
        
        <!-- Imagem Antes (Original) -->
        <img src="https://criarleal.github.io/improvepic/622940303.jpg" alt="Antes" id="img-before">

        <!-- Indicador centralizado -->
        <div class="indicator-pill">
            <span id="sparkle-icon" class="sparkle">✨</span>
            <span id="label-text" class="text-white/90 text-sm font-bold uppercase tracking-widest">Segure para comparar</span>
        </div>
    </div>

    <p class="instruction">Toque e mantenha pressionado</p>

    <script>
        const container = document.getElementById('main-container');
        const badge = document.getElementById('badge');
        const labelText = document.getElementById('label-text');
        const sparkle = document.getElementById('sparkle-icon');

        function activate(e) {
            if (e) e.preventDefault();
            container.classList.add('is-active');
            badge.innerText = 'DEPOIS';
            labelText.innerText = 'Qualidade Pro Ativa';
            sparkle.style.display = 'inline';
        }

        function deactivate() {
            container.classList.remove('is-active');
            badge.innerText = 'ANTES';
            labelText.innerText = 'Segure para comparar';
            sparkle.style.display = 'none';
        }

        // Eventos Mobile
        container.addEventListener('touchstart', activate, {passive: false});
        container.addEventListener('touchend', deactivate);
        container.addEventListener('touchcancel', deactivate);

        // Eventos Desktop
        container.addEventListener('mousedown', activate);
        container.addEventListener('mouseup', deactivate);
        container.addEventListener('mouseleave', deactivate);
    </script>
</body>
</html>
