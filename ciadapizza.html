<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comparador de Qualidade - Cia da Pizza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: black;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            width: 100vw;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 1rem;
            box-sizing: border-box;
            gap: 1.5rem; /* Espaço entre a imagem e o botão */
        }

        .container-img {
            position: relative;
            width: 100%;
            max-width: 550px; 
            aspect-ratio: 1 / 1; 
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: #080808;
            cursor: pointer;
        }

        img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.25s ease-in-out;
            pointer-events: none;
        }

        #img-before {
            z-index: 10;
        }

        .status-badge {
            position: absolute;
            top: 1.25rem;
            left: 1.25rem;
            z-index: 30;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.15em;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            pointer-events: none;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.7);
        }

        /* O NOVO BOTÃO FORA DA IMAGEM */
        .external-pill {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 1rem 2.5rem;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            white-space: nowrap;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 260px;
            justify-content: center;
        }

        .sparkle {
            display: none;
            color: #fbbf24;
            font-size: 1.2rem;
        }

        /* Estados ativos */
        .is-active #img-before {
            opacity: 0;
        }

        .is-active .status-badge {
            background-color: #e11d48;
            border-color: #fb7185;
            color: white;
            transform: scale(1.05);
        }

        /* Mudança no botão externo quando pressionado */
        .is-active .external-pill {
            background: rgba(225, 29, 72, 0.1);
            border-color: rgba(225, 29, 72, 0.5);
            transform: scale(0.95);
        }

        .is-active .sparkle {
            display: inline;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        .instruction-footer {
            color: rgba(255, 255, 255, 0.2);
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.3em;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="container-img" id="main-container">
            <!-- Etiqueta de Status -->
            <div id="badge" class="status-badge bg-black/40">
                ANTES
            </div>

            <!-- Imagem Depois -->
            <img src="https://criarleal.github.io/improvepic/qcE2d3g.png" alt="Depois" id="img-after">
            
            <!-- Imagem Antes -->
            <img src="https://criarleal.github.io/improvepic/622940303.jpg" alt="Antes" id="img-before">
        </div>

        <!-- INDICADOR AGORA FORA DA IMAGEM -->
        <div class="external-pill" id="action-pill">
            <span id="sparkle-icon" class="sparkle">✨</span>
            <span id="label-text" class="text-white/80 text-xs font-black uppercase tracking-[0.2em]">Segure para comparar</span>
        </div>

        <p class="instruction-footer">Pressione em qualquer lugar da imagem</p>
    </div>

    <script>
        const container = document.getElementById('main-container');
        const badge = document.getElementById('badge');
        const labelText = document.getElementById('label-text');
        const sparkle = document.getElementById('sparkle-icon');
        const body = document.body;

        function activate(e) {
            if (e && e.cancelable) e.preventDefault();
            body.classList.add('is-active');
            badge.innerText = 'DEPOIS';
            labelText.innerText = 'Qualidade Pro Ativa';
            sparkle.style.display = 'inline';
        }

        function deactivate() {
            body.classList.remove('is-active');
            badge.innerText = 'ANTES';
            labelText.innerText = 'Segure para comparar';
            sparkle.style.display = 'none';
        }

        // Eventos na Imagem
        container.addEventListener('touchstart', activate, {passive: false});
        container.addEventListener('touchend', deactivate);
        container.addEventListener('touchcancel', deactivate);

        container.addEventListener('mousedown', activate);
        container.addEventListener('mouseup', deactivate);
        container.addEventListener('mouseleave', deactivate);

        // Previne menu de contexto
        container.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
