<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comparador de Qualidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: black;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            width: 100vw;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 1rem;
            box-sizing: border-box;
            gap: 2rem;
        }

        /* CONTAINER INTELIGENTE */
        .container-img {
            position: relative;
            display: inline-block; /* Ajusta-se à largura da imagem interior */
            max-width: 100%;
            max-height: 70vh; 
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: #050505;
        }

        /* Imagem base (Depois) - Ela define o tamanho do container */
        .img-base {
            display: block;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
        }

        /* Imagem de topo (Antes) - Copia o tamanho da base */
        .img-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 10;
            transition: opacity 0.25s ease-in-out;
        }

        .status-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 20;
            padding: 0.4rem 1rem;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.2em;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            pointer-events: none;
            color: white;
            background: rgba(0,0,0,0.3);
        }

        /* BOTÃO DE INTERAÇÃO */
        .btn-interativo {
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(15px);
            padding: 1.2rem 2.5rem;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 280px;
            justify-content: center;
            user-select: none;
            touch-action: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* ESTADOS ATIVOS */
        body.is-active .img-overlay {
            opacity: 0;
        }

        body.is-active .status-badge {
            background-color: #e11d48;
            border-color: #fb7185;
        }

        body.is-active .btn-interativo {
            background: rgba(225, 29, 72, 0.3);
            border-color: #e11d48;
            transform: scale(0.95);
        }

        .sparkle {
            display: none;
            color: #fbbf24;
        }

        body.is-active .sparkle {
            display: inline;
        }

        .footer-text {
            color: rgba(255,255,255,0.2);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="container-img">
            <div id="badge" class="status-badge">ANTES</div>
            
            <!-- DEPOIS (Fica no fundo e define o tamanho) -->
            <img src="https://criarleal.github.io/improvepic/qcE2d3g.png" class="img-base" alt="Depois">
            
            <!-- ANTES (Fica por cima e desaparece) -->
            <img src="https://criarleal.github.io/improvepic/622940303.jpg" class="img-overlay" alt="Antes">
        </div>

        <div class="btn-interativo" id="main-btn">
            <span class="sparkle">✨</span>
            <span id="btn-text" class="text-white text-xs font-black uppercase tracking-[0.2em]">Segure para comparar</span>
        </div>

        <p class="footer-text">Controlo de Qualidade</p>
    </div>

    <script>
        const btn = document.getElementById('main-btn');
        const badge = document.getElementById('badge');
        const btnText = document.getElementById('btn-text');
        const body = document.body;

        function ligar(e) {
            if (e && e.cancelable) e.preventDefault();
            body.classList.add('is-active');
            badge.innerText = 'DEPOIS';
            btnText.innerText = 'Qualidade Pro Ativa';
        }

        function desligar() {
            body.classList.remove('is-active');
            badge.innerText = 'ANTES';
            btnText.innerText = 'Segure para comparar';
        }

        // Eventos de toque (Mobile)
        btn.addEventListener('touchstart', ligar, {passive: false});
        btn.addEventListener('touchend', desligar);
        btn.addEventListener('touchcancel', desligar);

        // Eventos de rato (PC)
        btn.addEventListener('mousedown', ligar);
        window.addEventListener('mouseup', desligar);

        // Bloquear menu de contexto
        btn.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
