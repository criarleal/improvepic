<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comparador de Qualidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: black;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh; /* Usa dynamic viewport height para mobile */
            width: 100vw;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 1rem;
            box-sizing: border-box;
        }

        .container-img {
            position: relative;
            width: 100%;
            /* Ajusta a altura proporcionalmente para não estourar a tela */
            max-height: 75vh; 
            aspect-ratio: 1 / 1; /* Mantém o formato da pizza */
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: #080808;
            transition: transform 0.2s ease;
        }

        img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* Garante que a pizza nunca seja cortada */
            transition: opacity 0.2s ease-in-out;
        }

        #img-before {
            z-index: 10;
        }

        .status-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 30;
            padding: 0.4rem 0.8rem;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .indicator-pill {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            padding: 0.8rem 1.5rem;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            white-space: nowrap;
            pointer-events: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        /* Estilo para quando estiver pressionando */
        .is-active #img-before {
            opacity: 0;
        }

        .is-active .status-badge {
            background-color: #e11d48;
            border-color: #fb7185;
            color: white;
        }

        .instruction {
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.4);
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-align: center;
        }

        /* Ajustes específicos para telas muito pequenas */
        @media (max-height: 600px) {
            .container-img {
                max-height: 60vh;
            }
            .indicator-pill {
                padding: 0.6rem 1rem;
                bottom: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="container-img" id="main-container">
            <!-- Badge de Status -->
            <div id="badge" class="status-badge bg-black/40 text-white/60">
                ANTES
            </div>

            <!-- Foto Masterizada -->
            <img src="https://criarleal.github.io/improvepic/qcE2d3g.png" alt="Depois" id="img-after">
            
            <!-- Foto Original -->
            <img src="https://criarleal.github.io/improvepic/622940303.jpg" alt="Antes" id="img-before">

            <!-- Botão de Instrução -->
            <div class="indicator-pill">
                <span id="sparkle-icon" style="display:none">✨</span>
                <span id="label-text" class="text-white text-xs font-bold uppercase tracking-widest">Segure para comparar</span>
            </div>
        </div>

        <p class="instruction">Pressione para ver a mágica</p>
    </div>

    <script>
        const container = document.getElementById('main-container');
        const badge = document.getElementById('badge');
        const labelText = document.getElementById('label-text');
        const sparkle = document.getElementById('sparkle-icon');

        function activate(e) {
            // Previne zoom indesejado ou scroll ao segurar no mobile
            if (e && e.cancelable) e.preventDefault();
            
            container.classList.add('is-active');
            badge.innerText = 'DEPOIS';
            labelText.innerText = 'Qualidade Ultra HD';
            sparkle.style.display = 'inline';
        }

        function deactivate() {
            container.classList.remove('is-active');
            badge.innerText = 'ANTES';
            labelText.innerText = 'Segure para comparar';
            sparkle.style.display = 'none';
        }

        // Suporte Total para Mobile (Touch)
        container.addEventListener('touchstart', activate, {passive: false});
        container.addEventListener('touchend', deactivate);
        container.addEventListener('touchcancel', deactivate);

        // Suporte para Desktop (Mouse)
        container.addEventListener('mousedown', activate);
        container.addEventListener('mouseup', deactivate);
        container.addEventListener('mouseleave', deactivate);

        // Bloqueia o menu de contexto (clique direito) na imagem para não atrapalhar o "segurar"
        container.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
